name: CI
on: [push, pull_request]

jobs:
  quality-docs-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run quality:check
      - run: npm run docs:check
      - run: npm run audit:gate
